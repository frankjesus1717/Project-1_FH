<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Informacion Personal</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card class="card-hover-scale">
    <ion-card-header>
      <div class="avatar-wrapper">
        <ion-icon name="person-circle" class="avatar-icon"></ion-icon>
      </div>
      <ion-card-title class="ion-text-center">Mis Datos</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        @for (item of personalInfo; track item.label) {
          <ion-item class="item-hover-scale">
            <ion-icon
              aria-hidden="true"
              [name]="item.icon"
              slot="start"
              class="field-icon"
            ></ion-icon>
            <ion-label>
              <h2>{{ item.label }}</h2>
              <p>{{ item.value }}</p>
            </ion-label>
          </ion-item>
        }
      </ion-list>
    </ion-card-content>
  </ion-card>
</ion-content>
